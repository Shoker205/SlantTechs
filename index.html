<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlantTech | Developer</title>
    
    <!-- Шрифты: Montserrat (основа) и Fira Code (акценты) -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <!-- Иконки FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #030303;
            --card-bg: linear-gradient(145deg, rgba(25, 25, 30, 0.65) 0%, rgba(10, 10, 12, 0.85) 100%);
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --btn-bg: linear-gradient(145deg, rgba(35, 35, 40, 0.5), rgba(15, 15, 20, 0.5));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-base);
            /* Точечная сетка на фоне (Dot Grid) */
            background-image: radial-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 24px 24px;
            padding: 20px;
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимированные плавающие свечения на фоне */
        .glow-1, .glow-2 {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.6;
            animation: floatGlow 15s ease-in-out infinite alternate;
        }

        .glow-1 {
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: rgba(255, 255, 255, 0.08);
        }

        .glow-2 {
            bottom: -10%; right: -10%;
            width: 60vw; height: 60vw;
            background: rgba(255, 255, 255, 0.05);
            animation-duration: 20s;
            animation-direction: alternate-reverse;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* ---------------- КАРТОЧКА ---------------- */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.8),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* ---------------- БАННЕР (Строго сверху) ---------------- */
        .banner {
            height: 140px;
            background-image: url('banner.png');
            background-size: cover;
            background-position: center;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Легкий градиент снизу баннера, чтобы он плавно переходил в карточку */
        .banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(10,10,12,0.9) 100%);
        }

        /* ---------------- ПРОФИЛЬ ---------------- */
        .profile {
            text-align: center;
            padding: 24px 24px 0; /* Отступ сверху вместо отрицательного margin */
            position: relative;
            z-index: 2;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: #000;
            object-fit: cover;
            border: 3px solid #1a1a1f;
            box-shadow: 
                0 15px 30px rgba(0, 0, 0, 0.6),
                inset 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @media (hover: hover) {
            .avatar:hover {
                transform: scale(1.08) rotate(5deg);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 25px rgba(255, 255, 255, 0.1);
            }
        }
        .avatar:active { transform: scale(0.95); }

        .name {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 16px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 4px 15px rgba(255,255,255,0.15);
        }

        .role {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .role::before { content: "<"; color: #4a4a52; }
        .role::after { content: "/>"; color: #4a4a52; }

        /* ---------------- КНОПКИ ---------------- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 32px 24px 40px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
            color: var(--text-main);
            background: var(--btn-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 8px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 2px rgba(255, 255, 255, 0.05);
            padding: 18px 20px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .link-btn:nth-child(1) { animation-delay: 0.15s; }
        .link-btn:nth-child(2) { animation-delay: 0.25s; }
        .link-btn:nth-child(3) { animation-delay: 0.35s; }

        .link-btn i {
            position: absolute;
            left: 24px;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .link-btn span { z-index: 1; }

        /* Ховер-эффекты для ПК */
        @media (hover: hover) {
            .link-btn:hover {
                transform: translateY(-3px);
                background: linear-gradient(145deg, rgba(50, 50, 55, 0.6), rgba(30, 30, 35, 0.6));
            }

            .link-btn:hover i { transform: scale(1.15); }

            .link-btn.tg:hover {
                border-color: #2481cc;
                box-shadow: 0 12px 24px rgba(36, 129, 204, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.1);
                color: #4da6ff;
            }
            .link-btn.tg:hover i { color: #4da6ff; }

            .link-btn.vk:hover {
                border-color: #0077ff;
                box-shadow: 0 12px 24px rgba(0, 119, 255, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.1);
                color: #4d9cff;
            }
            .link-btn.vk:hover i { color: #4d9cff; }

            .link-btn.tt:hover {
                border-color: #ff0050;
                box-shadow: 0 12px 24px rgba(255, 0, 80, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.1);
                text-shadow: 2px 0px 0px #00f2fe, -2px 0px 0px #ff0050;
                color: #fff;
            }
            .link-btn.tt:hover i { color: #fff; filter: drop-shadow(2px 0px 0px #00f2fe) drop-shadow(-2px 0px 0px #ff0050); }
        }

        /* Тактильный отклик (ПК + Смартфоны) */
        .link-btn:active {
            transform: scale(0.96) translateY(2px) !important;
            background: rgba(15, 15, 18, 0.8) !important;
            box-shadow: 
                0 2px 5px rgba(0, 0, 0, 0.5),
                inset 0 4px 10px rgba(0, 0, 0, 0.8) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.01) !important;
        }
        .link-btn:active i { transform: scale(0.95); }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптивность для смартфонов */
        @media (max-width: 480px) {
            body { padding: 15px; }
            .card { border-radius: 24px; }
            .banner { height: 120px; }
            .avatar { width: 100px; height: 100px; }
            .name { font-size: 1.6rem; }
            .links { padding: 25px 20px 30px; gap: 14px; }
            .link-btn { padding: 16px 20px; font-size: 1.05rem; border-radius: 16px; }
            .link-btn i { font-size: 1.35rem; left: 20px; }
        }
    </style>
</head>
<body>

    <!-- Анимированные свечения на заднем фоне -->
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="card">
        <!-- Баннер теперь строго сверху -->
        <div class="banner"></div>
        
        <!-- Профиль под баннером -->
        <div class="profile">
            <!-- Логотип -->
            <img src="logo.png" alt="SlantTech Logo" class="avatar">
            <h1 class="name">SlantTech</h1>
            <p class="role">Developer</p>
        </div>

        <!-- Кнопки -->
        <div class="links">
            <a href="https://t.me/slant_tech" target="_blank" class="link-btn tg">
                <i class="fa-brands fa-telegram"></i>
                <span>Telegram</span>
            </a>
            
            <a href="https://vk.ru/slant_tech" target="_blank" class="link-btn vk">
                <i class="fa-brands fa-vk"></i>
                <span>VK</span>
            </a>
            
            <a href="https://www.tiktok.com/@slant_tech" target="_blank" class="link-btn tt">
                <i class="fa-brands fa-tiktok"></i>
                <span>TikTok</span>
            </a>
        </div>
    </div>

</body>
</html>
